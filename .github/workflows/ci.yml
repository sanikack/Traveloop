name: frontend CI

on:
 push:
  branches:
   - master

jobs:
 build:
  runs-on: ubuntu-latest

steps:
 - uses: actions/checkout@v4

 - uses: actions/setup-node@v4
   with:
    node-version: 22

 - name: Install Dependencies
run: |
 npm install


- name: Build React App
run: |
 cd practice
 npm run build


